<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description"
    content="HomeShelf — Smart grocery inventory tracker to manage household items and reduce food waste.">
  <meta name="theme-color" content="#0f1118">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>HomeShelf — Grocery Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
</head>

<body>
  <div id="app">
    <!-- Dynamic content rendered here by app.js -->
    <div id="page-content"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <div class="nav-item active" data-tab="inventory" id="nav-inventory">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Inventory</span>
      </div>
      <div class="nav-item nav-add" data-tab="add" id="nav-add">
        <span class="nav-icon">+</span>
        <span class="nav-label">Add</span>
      </div>
      <div class="nav-item" data-tab="lowstock" id="nav-lowstock">
        <span class="nav-icon">⚠️</span>
        <span class="nav-label">Low Stock</span>
      </div>
    </nav>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/db.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/add-edit.js"></script>
  <script src="js/low-stock.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Register Service Worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
